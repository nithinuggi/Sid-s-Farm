<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
        }
        .container{
            border: 2px solid black;
            height: 100vh;
            width: 100%;
            display: flex;
            /* overflow: hidden; */
        }
        .left{
            border: 2px solid black;
            height: 100vh;
            width: 20%;
            background-color: red;
            overflow: scroll;
        }
        .left div {
            height: 200vh;
        }
        .right{
            border: 2px solid black;
            height: 100vh;
            width: 80%;
            overflow: scroll;
        }
        .top{
             border: 2px solid black;
            height: 20vh;
            width: 100%;background-color: aquamarine;
            position: sticky;
            top: 0px;
            

        }
        .normal{
            border: 2px solid black;
            height: 60vh;
            width: 100%;
            background-color: aqua;
        }
        .NOT{
             border: 2px solid black;
            height: 60vh;
            width: 100%;
            background-color: blueviolet;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <div></div>
        </div>
        <div class="right">
            <div class="top"></div>
            <div class="normal"></div>
            <div class="NOT"></div>
        </div> 
    </div>
</body>
</html>

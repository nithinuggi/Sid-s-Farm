<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .left{
      height: 746px;
    width: 50%;
    border: 1px solid black;
     border-top-right-radius: 40%;
    border-bottom-right-radius: 40%;
    /* background-color: aliceblue; */
    display: flex;
    flex-wrap: wrap;
    flex-direction: column;
    /* overflow: hidden; */
    /* position: relative; */
    /* animation-name: animate; */
  }
  .left div{
    height: 100%;
    width: 100%;
  }
  .left img{
    height: 100%;
    width: 100%;
  }
   .img1 {
    animation-name: animate;
    animation-duration: 10s;
    animation-delay: 1s;
    animation-iteration-count: infinite;
    /* animation-direction: alternate; */

  }
@keyframes animate {
  0%{
      transform: translateX(0%);

      animation-delay: 1s;
  }
  20%{
        transform: translateX(-200%);
  }
  40%{
    transform: translateY(200%);
  }
  /* 60%{
    transform: translateY(2000px);
  } */
 80%{
   transform: translateX(200%);
 }
   100%{
   transform: translateX(0%);
  } 
  
} 
 
.img2 {
    animation-name: animate1;
    animation-delay: 1s;
    animation-duration: 10s;

    animation-iteration-count: infinite;
  }
@keyframes animate1 {
  0%{
      transform: translateX(0%);

      
  }
  20%{
        transform: translateX(left div);
        animation-delay: 4s;
  }
  40%{
    transform: translateX(-200%);
  }
  60%{
    transform: translateY(300%);
  }



  100%{
   transform: translateX(0%);
  }
  
  
}
 .img3 {
    animation-name: animate2;
  animation-delay: 2.6s;
    animation-duration: 10s;

    animation-iteration-count: infinite;
  }
@keyframes animate2 {
  0%{
      transform: translateX(0%);
       animation-delay: 5s;
      
  }
  20%{
        transform: translateX(300%);
        animation-delay: 4s;
  }
  40%{
    transform: translateX(-200%);
  }
  60%{
    transform: translateY(300%);
  }



  100%{
   transform: translateX(0%);
  }
  
  
}
 
.img4 {
    animation-name: animate3;
  animation-delay: 4s;
    animation-duration: 10s;

    animation-iteration-count: infinite;
  }
@keyframes animate3 {
  0%{
      transform: translateX(0%);

      
  }
  20%{
        transform: translateX(400%);

      
        }
  40%{
    transform: translateX(-200%);
  }
  60%{
    transform: translateY(300%);
  }



  100%{
   transform: translateX(0%);
  }
  
  
}  
 
    

  </style>
</head>
<body>
  
  <div class="left">
    <div class="img1">
      <img src="./milk_product_images-05.webp.png"  alt=""></div>
    <div class="img2">
      <img src="./milk_product_images-06.webp.png" alt=""></div>
    <div class="img3"> 
      <img src="./milk_product_images-07.webp.png" alt=""></div>
    <div class="img4">
      <img src="./milk_product_images-08.webp.png" alt=""></div>
  </div>
</body>
</html>
